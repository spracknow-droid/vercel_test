<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 첫 Vercel 웹사이트</title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #0070f3; }
        button {
            padding: 10px 20px;
            background-color: #0070f3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #0051ad; }
    </style>
</head>
<body>
    <div class="container">
        <h1>반갑습니다! 👋</h1>
        <p>Vercel을 통해 배포될 간단한 웹페이지입니다.</p>
        <button onclick="greet()">클릭해보세요</button>
        <p id="message"></p>
    </div>

    <script>
        function greet() {
            const msg = document.getElementById('message');
            msg.innerText = "웹페이지가 성공적으로 작동 중입니다!";
            msg.style.color = "#4caf50";
        }
    </script>
</body>
</html>
